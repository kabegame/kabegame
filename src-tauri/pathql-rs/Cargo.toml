[package]
name = "pathql-rs"
edition = { workspace = true }
version = { workspace = true }
description = "Path-folding query DSL — AST + Loader + Registry; json5 / validate / compose features"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
json5 = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
regex-automata = { workspace = true, optional = true }
sqlparser = { workspace = true, optional = true }

[features]
default = []
json5 = ["dep:json5"]
validate = ["dep:regex", "dep:regex-automata", "dep:sqlparser"]
compose = []

[dev-dependencies]
serde_json = { workspace = true }
