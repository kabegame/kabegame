[package]
name = "pathql-rs"
edition = { workspace = true }
version = { workspace = true }
description = "Path-folding query DSL — AST + Loader 抽象，json5 适配器 + 加载期语义校验 (RULES §10) features"

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
json5 = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
regex-automata = { workspace = true, optional = true }
sqlparser = { workspace = true, optional = true }

[features]
default = []
json5 = ["dep:json5"]
validate = ["dep:regex", "dep:regex-automata", "dep:sqlparser"]

[dev-dependencies]
serde_json = { workspace = true }
