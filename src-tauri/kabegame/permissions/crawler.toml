[[permission]]
identifier = "crawler"
description = "Crawler window permissions"
commands.allow = [
    # apis
    "crawl_get_page_label",
    "crawl_get_page_state",
    "crawl_get_state",
    "crawl_fs_open",
    "crawl_fs_create",
    "crawl_fs_fread",
    "crawl_fs_fwrite",
    "crawl_fs_fseek",
    "crawl_fs_fstat",
    "crawl_fs_ftruncate",
    "crawl_fs_close",
    "crawl_fs_read_file",
    "crawl_fs_read_text_file",
    "crawl_fs_write_file",
    "crawl_fs_write_text_file",
    "crawl_fs_mkdir",
    "crawl_fs_read_dir",
    "crawl_fs_remove",
    "crawl_fs_stat",
    "crawl_fs_lstat",
    "crawl_fs_rename",
    "crawl_fs_copy_file",
    "crawl_fs_exists",
    "crawl_fs_truncate",
    "crawl_fs_size",
    "crawl_fs_get_root",
    "crawl_task_log",
    "crawl_add_progress",
    "crawl_download_image",
    "crawl_media_begin",
    "crawl_media_chunk",
    "crawl_media_end",
    "crawl_to",
    "crawl_back",
    "crawl_update_page_state",
    "crawl_update_state",
    "crawl_exit",
    "crawl_error",
    "show_crawler_window",
    "crawl_clear_site_data",
]
