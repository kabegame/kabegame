[template]
cargo_generate_version = ">=0.20"

[placeholders]
backend = { type = "string", prompt = "backend", choices = ["v8", "webview"], default = "v8" }

# v8 专属：非 v8 时忽略
[conditional.'backend != "v8"']
ignore = ["src", "rspack.config.mjs"]

# 单脚本：webview 用 crawl.js，v8 用打包产物
[conditional.'backend != "webview"']
ignore = ["crawl.js"]
