name: Release (cross-platform build and publish)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-24.04
    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Bun 1.3.6
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Setup Rust 1.92.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb \
            libgtk-3-dev \
            libsoup-3.0-dev \
            patchelf \
            libfuse3-dev \
            pkg-config

      - name: macOS FUSE (for fuser crate)
        if: runner.os == 'macOS'
        run: |
          brew install macfuse
          echo "PKG_CONFIG_PATH=$(brew --prefix macfuse)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install JavaScript dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Install tauri-cli 2.10.0
        run: cargo install tauri-cli --version 2.10.0

      - name: Build CLI (required before main packaging)
        run: bun b -c cli

      - name: Build main standard release package
        run: bun b -c main --mode standard --release

      - name: Build main light release package
        run: bun b -c main --mode light --release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | awk -v current="$CURRENT_TAG" '$0 != current {print; exit}')

          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- no changes")
          else
            CHANGES=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- no changes")
          fi

          {
            echo "changelog<<EOF"
            echo "## Changes"
            echo ""
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kabegame ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: release/*
