name: Release (cross-platform build and publish)

on:
  push:
    tags:
      - "v*.*.*-ci"

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest
          - name: linux
            os: ubuntu-24.04
    runs-on: ${{ matrix.platform.os }}

    env:
      # CI 用上方官方 deno 二进制，DenoCliPlugin 跳过从 third/deno 源码自编。
      KABEGAME_SKIP_DENO_CLI: "1"

    steps:
      - name: Checkout code (with submodules)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # 官方二进制仅作 CI bootstrap/运行器；本地/VM 用 third/deno 自编 CLI
      # （deno task build:deno）。third-patches/deno 只补 libs/core，不影响 CLI 行为。
      - name: Setup Deno 2.9.0
        uses: denoland/setup-deno@v2
        with:
          deno-version: "2.9.0"

      - name: Setup Rust 1.92.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt update && sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            webkit2gtk-driver \
            xvfb \
            libgtk-3-dev \
            libsoup-3.0-dev \
            patchelf \
            pkg-config \
            nasm \
            libx264-dev

      - name: macOS FUSE (for fuser crate) + x264 (for FFmpeg/rsmpeg)
        if: runner.os == 'macOS'
        run: |
          brew install macfuse x264 nasm
          echo "PKG_CONFIG_PATH=$(brew --prefix macfuse)/lib/pkgconfig" >> $GITHUB_ENV

      # Windows：FFmpeg 须用 MinGW 编出动态库（libav* DLL），并用 gendef + MSVC lib.exe 生成导入库。
      # 主程序仍是 windows-msvc（Dokan 兼容），经导入库链接这些 DLL。
      - name: Setup MSYS2 (MinGW x264 + gendef) [Windows]
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          # 继承 Windows PATH，使 msvc-dev-cmd 设置的 lib.exe 在 MSYS2 shell 中可用
          path-type: inherit
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-x264
            mingw-w64-x86_64-tools-git
            nasm
            make
            pkgconf

      - name: Setup MSVC environment (lib.exe for import libs) [Windows]
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install JavaScript dependencies (frozen lockfile)
        run: deno install --frozen

      - name: Install tauri-cli 2.10.0
        run: cargo install tauri-cli --version 2.10.0

      # 构建 libav*（rsmpeg 链接所需）。须在 cargo 构建之前执行：
      #   - Unix：静态库 third/FFmpeg-build/install/lib/*.a
      #   - Windows：动态库 bin/avcodec-*.dll 等 + install/lib/*.lib 导入库（MSYS2 + lib.exe）
      - name: Build FFmpeg libraries (rsmpeg) [Unix]
        if: runner.os != 'Windows'
        run: deno task build:ffmpeg

      - name: Build FFmpeg libraries (rsmpeg) [Windows]
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: bash scripts/build-ffmpeg.sh

      - name: Build CLI (required before main packaging)
        run: deno task b -c kabegame-cli

      - name: Build main standard release package
        run: deno task b -c kabegame --mode standard --release

      - name: Build main light release package
        run: deno task b -c kabegame --mode light --release

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-version:refname | awk -v current="$CURRENT_TAG" '$0 != current {print; exit}')

          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- no changes")
          else
            CHANGES=$(git log "${PREV_TAG}..${CURRENT_TAG}" --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- no changes")
          fi

          {
            echo "changelog<<EOF"
            echo "## Changes"
            echo ""
            echo "$CHANGES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kabegame ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: release/*
